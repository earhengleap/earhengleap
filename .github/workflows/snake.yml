name: Generate Snake

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
  push:
    branches: main

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Platane/snk@v3
        with:
          github_user_name: earhengleap
          svg_out_path: output/snake.svg
      - uses: actions/upload-artifact@v4
        with:
          name: snake
          path: output/snake.svg
