name: Generate Snake

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  
jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: output
          persist-credentials: true
          fetch-depth: 0
      
      - name: Create images directory
        run: mkdir -p images
      
      - uses: Platane/snk@v3
        id: snk
        with:
          github_user_name: earhengleap
          svg_out_path: images/snake.svg
          
      - uses: Platane/snk@v3
        id: snk-dark
        with:
          github_user_name: earhengleap
          svg_out_path: images/snake-dark.svg
          palette: github-dark
          
      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update snake animations
          branch: output
          file_pattern: images/
