name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: earhengleap
          outputs: |
            dist/images/github-contribution-grid-snake.svg?color_snake=%232E9D6B&color_dots=%23EBEDF0,%23CDEEDB,%239DDEB8,%2366C48D,%23145A43
            dist/images/github-snake-dark.svg?color_snake=%2339D353&color_dots=%23161B22,%230B3D2E,%23145A43,%231E7A57,%232E9D6B

      - name: Push snake to output branch
        uses: crazy-max/ghaction-github-pages@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          target_branch: output
          build_dir: dist
